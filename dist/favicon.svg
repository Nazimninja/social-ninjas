<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <style>
      .bg { fill: #07101e; }
      .ring { fill: none; stroke: #5ba4f5; stroke-width: 2; stroke-dasharray: 4 2; transform-origin: 32px 32px; animation: spin 3s linear infinite; }
      .ring2 { fill: none; stroke: rgba(91,164,245,0.3); stroke-width: 1; transform-origin: 32px 32px; animation: spin 6s linear infinite reverse; }
      .dot { fill: #5ba4f5; animation: blink 1.5s ease-in-out infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    </style>
  </defs>
  <rect class="bg" width="64" height="64" rx="14"/>
  <circle class="ring2" cx="32" cy="32" r="28"/>
  <circle class="ring" cx="32" cy="32" r="22"/>
  <text x="32" y="44" font-size="28" text-anchor="middle" font-family="system-ui">🥷</text>
  <circle class="dot" cx="48" cy="16" r="4"/>
</svg>